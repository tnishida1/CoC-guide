    const BOSS_TACTICS = [
      {
        name: 'Road Bully (Rock-Type)',
        description: 'A heavy-armored boss built around relentless forward movement and summoning endless Rocker waves.',
        weakness: 'Water / Grass',
        dangerMoves: 'Ground Slam: Deals heavy line-based damage and stuns frontline targets.',

    function App() {
      const [activeTab, setActiveTab] = useState('progression');
      const [selectedChapterId, setSelectedChapterId] = useState(5);
      const [dexSearch, setDexSearch] = useState('');
      const [selectedElementFilter, setSelectedElementFilter] = useState('All');
      const [selectedTierFilter, setSelectedTierFilter] = useState('All');
      const [selectedTatariDetail, setSelectedTatariDetail] = useState(null);
      const [squad, setSquad] = useState([]);
      const [showSupportModal, setShowSupportModal] = useState(false);
      const [checklist, setChecklist] = useState({
        dailyGift: false,
        dailyQuests: false,
        evolveTrials: false,
        bentoCraft: false
      });

      const toggleChecklist = (key) => {
        setChecklist({ ...checklist, [key]: !checklist[key] });
      };

      const filteredTataris = useMemo(() => {
        return TATARI_DATA.filter(t => {
          const matchesSearch = t.name.toLowerCase().includes(dexSearch.toLowerCase()) || 
                                t.role.toLowerCase().includes(dexSearch.toLowerCase());
          const matchesElement = selectedElementFilter === 'All' || t.element === selectedElementFilter;
          const matchesTier = selectedTierFilter === 'All' || t.tier === selectedTierFilter;
          return matchesSearch && matchesElement && matchesTier;
        });
      }, [dexSearch, selectedElementFilter, selectedTierFilter]);

      const squadStats = useMemo(() => {
        if (squad.length === 0) return null;
        const elements = {};
        squad.forEach(t => { elements[t.element] = (elements[t.element] || 0) + 1; });
        
        let aura = 'No Active Aura (Need at least 2 of the same element)';
        let auraColor = 'text-slate-400';
        Object.entries(elements).forEach(([el, count]) => {
          if (count >= 3) {
            aura = `🔥 Level 2 ${el} Aura Activated: (+25% Attribute power, -15% Skill Cooldown)`;
            auraColor = 'text-emerald-400 font-bold';
          } else if (count === 2) {
            aura = `⚡ Level 1 ${el} Aura Activated: (+10% Attribute power)`;
            auraColor = 'text-amber-400 font-semibold';
          }
        });
        return { aura, auraColor };
      }, [squad]);

      const addToSquad = (tatari) => {
        if (squad.length >= 4 || squad.some(t => t.id === tatari.id)) return;
        setSquad([...squad, tatari]);
      };

      const removeFromSquad = (id) => {
        setSquad(squad.filter(t => t.id !== id));
      };

      const getElementBadgeClass = (el) => {
        switch (el) {
          case 'Fire': return 'bg-rose-500/20 text-rose-300 border border-rose-500/40';
          case 'Water': return 'bg-sky-500/20 text-sky-300 border border-sky-500/40';
          case 'Leaf': return 'bg-emerald-500/20 text-emerald-300 border border-emerald-500/40';
          case 'Earth': return 'bg-amber-500/20 text-amber-300 border border-amber-500/40';
          case 'Lightning': return 'bg-yellow-500/20 text-yellow-300 border border-yellow-500/40';
          default: return 'bg-slate-500/20 text-slate-300 border border-slate-500/40';
        }
      };

      const getElementIcon = (el) => {
        switch (el) {
          case 'Fire': return <FlameIcon />;
          case 'Water': return <DropletIcon />;
          case 'Leaf': return <LeafIcon />;
          case 'Earth': return <ShieldIcon />;
          case 'Lightning': return <ZapIcon />;
          default: return null;
        }
      };

      const currentChapter = CHAPTER_GUIDES.find(c => c.id === selectedChapterId);

                </span>
                <h1 className="text-3xl font-extrabold tracking-tight text-white mt-1">
                  Tatari Master Class Guide
                </h1>
              </div>
              
              <div className="flex flex-wrap items-center gap-2.5">
                {/* Support Button */}

                  onClick={() => setShowSupportModal(true)}
                  className="bg-gradient-to-r from-amber-500 to-yellow-500 hover:from-amber-400 hover:to-yellow-400 text-slate-950 font-bold text-xs px-3.5 py-2 rounded-xl shadow-lg shadow-amber-500/15 flex items-center gap-1.5 transition-all transform hover:-translate-y-0.5 active:translate-y-0"

                </button>

                  <button onClick={() => setActiveTab('synergy')} className={`px-3 py-1.5 rounded-lg text-xs font-semibold ${activeTab === 'synergy' ? 'bg-emerald-500 text-white' : 'text-slate-400'}`}>⚔️ Squads</button>

                  <div className="space-y-2">

                      {Object.keys(checklist).map(key => (
                        <label key={key} className="flex items-center gap-2 text-xs text-slate-300 cursor-pointer">
                          <input type="checkbox" checked={checklist[key]} onChange={() => toggleChecklist(key)} className="rounded text-emerald-500" />

                      <div className="bg-slate-950/50 p-3 rounded-xl border border-slate-800/60">

                      </div>
                      <div className="bg-slate-950/50 p-3 rounded-xl border border-slate-800/60">
                        <div className="text-[10px] text-slate-400 font-medium">Evolution</div>
                        <div className="text-sm font-bold text-slate-200 mt-1 truncate">{currentChapter.targetTier}</div>
                      </div>
                      <div className="bg-slate-950/50 p-3 rounded-xl border border-slate-800/60">
                        <div className="text-[10px] text-slate-400 font-medium">Difficulty</div>

                        <p className="text-sm text-slate-300">{currentChapter.strategy}</p>
                      </div>
                    </div>
                  </div>

                  {selectedChapterId === 5 && (
                    <div className="bg-rose-950/30 border border-rose-500/20 p-5 rounded-2xl flex gap-4">
                      <InfoIcon />
                      <div>
                        <h4 className="font-bold text-rose-300 text-base">Stuck on Stage 5-80? Here is the Trick!</h4>
                        <p className="text-xs text-slate-300 mt-1">
                          Bring multiple water elements, focus on keeping your sustain units alive, and prioritize manual aiming targets that deal explosive damage.
                        </p>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* TATARI DEX */}
            {activeTab === 'dex' && (
              <div className="space-y-6">
                <div className="bg-slate-900/50 p-4 rounded-2xl border border-slate-800 flex flex-col sm:flex-row gap-4 items-center justify-between">
                  <div className="relative w-full sm:w-72">
                    <SearchIcon />
                    <input
                      type="text"
                      placeholder="Search Tatari name..."
                      value={dexSearch}
                      onChange={(e) => setDexSearch(e.target.value)}
                      className="w-full bg-slate-950 border border-slate-800 rounded-xl pl-9 pr-4 py-2 text-sm text-slate-200"
                    />
                  </div>

                  <div className="flex gap-2">
                    {['All', 'Fire', 'Water', 'Leaf', 'Earth', 'Lightning'].map(el => (
                      <button key={el} onClick={() => setSelectedElementFilter(el)} className={`px-2.5 py-1 rounded text-xs font-bold ${selectedElementFilter === el ? 'bg-slate-800 border border-emerald-500' : 'bg-slate-950 text-slate-400'}`}>
                        {el}
                      </button>
                    ))}
                  </div>
                </div>

                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                  {filteredTataris.map(tatari => (
                    <div key={tatari.id} className="bg-slate-900/40 rounded-2xl border border-slate-800 p-4 flex flex-col justify-between">
                      <div>
                        <div className="flex items-center justify-between mb-2">
                          <span className={`text-[10px] px-2 py-0.5 rounded font-extrabold ${getElementBadgeClass(tatari.element)}`}>
                            {tatari.element}
                          </span>
                          <span className="text-xs font-black bg-indigo-500 px-1.5 py-0.5 rounded">{tatari.tier}</span>
                        </div>
                        <h3 className="text-lg font-bold text-white">{tatari.name}</h3>
                        <p className="text-xs text-slate-400 italic mt-0.5">{tatari.role}</p>
                        <p className="text-xs text-slate-300 mt-2 line-clamp-2">{tatari.description}</p>
                      </div>

                      <div className="mt-4 pt-3 border-t border-slate-800/60 flex items-center justify-between">
                        <button onClick={() => setSelectedTatariDetail(tatari)} className="text-xs text-emerald-400 font-bold">View Evolutions</button>
                        <button onClick={() => addToSquad(tatari)} className="text-xs px-2.5 py-1 rounded font-bold bg-emerald-500 hover:bg-emerald-400 text-white">Add</button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* SQUAD BUILDER */}
            {activeTab === 'synergy' && (
              <div className="space-y-6">
                <div className="bg-slate-900/40 p-6 rounded-2xl border border-slate-800">
                  <h2 className="text-xl font-bold text-white">Squad Synergy Test ({squad.length}/4)</h2>
                  
                  <div className="grid grid-cols-2 sm:grid-cols-4 gap-4 my-6">
                    {[0, 1, 2, 3].map(index => {
                      const tatari = squad[index];
                      return (
                        <div key={index} className="h-36 rounded-2xl border border-slate-800 bg-slate-950/60 flex flex-col items-center justify-center p-3 relative">
                          {tatari ? (
                            <>
                              <button onClick={() => removeFromSquad(tatari.id)} className="absolute top-2 right-2 text-slate-400 hover:text-white">✕</button>
                              <span className="text-[9px] px-2 py-0.5 rounded bg-slate-800 text-white mb-1">{tatari.element}</span>
                              <div className="font-bold text-white">{tatari.name}</div>
                              <div className="text-[10px] text-slate-400 text-center mt-1">{tatari.role}</div>
                            </>
                          ) : (
                            <div className="text-xs text-slate-600">Empty Slot</div>
                          )}
                        </div>
                      );
                    })}
                  </div>

                  {squadStats && (
                    <div className="bg-slate-950/60 p-4 rounded-xl border border-slate-800">
                      <div className="text-xs text-slate-400 uppercase">Active Elemental Synergy:</div>
                      <div className={`text-sm mt-1 ${squadStats.auraColor}`}>{squadStats.aura}</div>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* BOSS TACTICS */}
            {activeTab === 'bosses' && (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                {BOSS_TACTICS.map(boss => (
                  <div key={boss.name} className="bg-slate-900/40 p-5 rounded-2xl border border-slate-800">
                    <div className="flex justify-between items-center mb-2">
                      <h3 className="text-lg font-bold text-white">{boss.name}</h3>
                      <span className="text-xs bg-rose-500/10 text-rose-300 px-2 py-0.5 rounded">Weakness: {boss.weakness}</span>
                    </div>
                    <p className="text-xs text-slate-400 leading-relaxed mb-3">{boss.description}</p>
                    <div className="bg-slate-950/50 p-3 rounded-lg border border-slate-800 text-xs">
                      <strong className="text-rose-400 block mb-1">Dangerous Move:</strong>
                      {boss.dangerMoves}
                    </div>
                    <ul className="list-disc pl-5 text-xs text-slate-300 mt-3 space-y-1">
                      {boss.tips.map((tip, idx) => <li key={idx}>{tip}</li>)}
                    </ul>
                  </div>
                ))}
              </div>
            )}
          </main>

          {/* SUPPORT DEVELOPER MODAL */}
          {showSupportModal && (
            <div className="fixed inset-0 bg-slate-950/90 backdrop-blur-md flex items-center justify-center p-4 z-50 animate-fadeIn">
              <div className="bg-slate-900 border border-slate-800 rounded-3xl max-w-md w-full p-6 relative shadow-2xl overflow-hidden">
                <div className="absolute top-0 right-0 left-0 h-1.5 bg-gradient-to-r from-amber-500 via-yellow-400 to-amber-600"></div>
                <button 
                  onClick={() => setShowSupportModal(false)} 
                  className="absolute top-4 right-4 text-slate-400 hover:text-white bg-slate-950 p-1.5 rounded-full"
                >
                  ✕
                </button>
                
                <div className="text-center mt-3">
                  <div className="bg-amber-500/10 text-amber-400 rounded-full w-14 h-14 flex items-center justify-center mx-auto mb-3">
                    <CoffeeIcon className="w-7 h-7" />
                  </div>
                  <h3 className="text-xl font-black text-white">Support the Creator</h3>
                  <p className="text-xs text-slate-400 mt-1 max-w-sm mx-auto">
                    Help keep this companion app active, completely ad-free, and updated with the newest chapters!
                  </p>
                </div>

                {/* Simulated Tiers */}
                <div className="grid grid-cols-3 gap-3 my-5">
                  <a 
                    href="https://ko-fi.com" 
                    target="_blank" 
                    className="bg-slate-950 hover:bg-slate-900 border border-slate-850 rounded-2xl p-3 text-center transition"
                  >
                    <span className="block text-[10px] text-slate-500 font-bold uppercase mb-0.5">Copper</span>
                    <span className="text-base font-extrabold text-white font-mono">$3</span>
                    <span className="block text-[9px] text-amber-400 mt-1">1 Bento Bowl 🍱</span>
                  </a>
                  <a 
                    href="https://ko-fi.com" 
                    target="_blank" 
                    className="bg-slate-950 hover:bg-slate-900 border border-slate-850 rounded-2xl p-3 text-center transition"
                  >
                    <span className="block text-[10px] text-slate-500 font-bold uppercase mb-0.5">Silver</span>
                    <span className="text-base font-extrabold text-white font-mono">$5</span>
                    <span className="block text-[9px] text-emerald-400 mt-1">1 Pinball Ball 🔮</span>
                  </a>
                  <a 
                    href="https://ko-fi.com" 
                    target="_blank" 
                    className="bg-slate-950 hover:bg-slate-900 border border-slate-850 rounded-2xl p-3 text-center transition"
                  >
                    <span className="block text-[10px] text-slate-500 font-bold uppercase mb-0.5">Gold</span>
                    <span className="text-base font-extrabold text-white font-mono">$10</span>
                    <span className="block text-[9px] text-yellow-400 mt-1">Elite Evolution 🦁</span>
                  </a>
                </div>

                {/* Customizable Link Notice */}
                <div className="bg-slate-950 p-3.5 rounded-xl border border-slate-850 text-xs text-slate-400 space-y-1.5">
                  <p className="text-slate-300 font-bold">💡 How to change these buttons to your links:</p>
                  <p>
                    Open your hosted code file, search for <code className="text-amber-400 font-mono">"https://ko-fi.com"</code>, and replace it with your personal link!
                  </p>
                </div>

                <div className="mt-5 pt-3 border-t border-slate-850/60 flex items-center justify-between text-[11px] text-slate-500">
                  <span>Processed securely on external platform</span>
                  <button 
                    onClick={() => setShowSupportModal(false)}
                    className="text-amber-400 hover:underline font-bold"
                  >
                    Close
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Evolution Dialog */}
          {selectedTatariDetail && (
            <div className="fixed inset-0 bg-slate-950/90 backdrop-blur-sm flex items-center justify-center p-4 z-50">
              <div className="bg-slate-900 border border-slate-800 rounded-2xl max-w-md w-full p-6 relative">
                <button onClick={() => setSelectedTatariDetail(null)} className="absolute top-4 right-4 text-slate-400 hover:text-white">✕</button>
                <h3 className="text-xl font-bold text-white mb-1">{selectedTatariDetail.name}</h3>
                <span className="text-xs text-emerald-400">{selectedTatariDetail.role}</span>
                <p className="text-xs text-slate-300 mt-2">{selectedTatariDetail.description}</p>
                
                <h4 className="text-xs font-bold text-slate-400 uppercase mt-4 mb-2">Evolutions Timeline:</h4>
                <div className="space-y-1">
                  {selectedTatariDetail.evolution.map((e, i) => (
                    <div key={e} className="text-xs bg-slate-950 p-2 rounded border border-slate-850">
                      Stage {i+1}: <strong className="text-white">{e}</strong>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
